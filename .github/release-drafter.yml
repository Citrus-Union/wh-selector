name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
category-template: '## $TITLE'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - bug
      - fix
      - documentation
      - dependencies
      - maintenance
  default: patch
categories:
  - title: 'Breaking Changes'
    labels:
      - breaking
  - title: 'Features'
    labels:
      - feature
      - enhancement
  - title: 'Bug Fixes'
    labels:
      - bug
      - fix
  - title: 'Documentation'
    labels:
      - documentation
  - title: 'Dependencies'
    labels:
      - dependencies
  - title: 'Maintenance'
    labels:
      - maintenance
  - title: 'Other Changes'
    labels:
      - '*'
template: |
  ## Changes

  $CHANGES

autolabeler:
  - label: breaking
    title:
      - '/breaking/i'
    branch:
      - '/breaking/i'
  - label: feature
    title:
      - '/feat(ure)?[:\(]/i'
    branch:
      - '/feat(ure)?[\/\-]/i'
  - label: fix
    title:
      - '/fix[:\(]/i'
    branch:
      - '/fix[\/\-]/i'
  - label: documentation
    files:
      - '*.md'
      - 'docs/**/*'
  - label: dependencies
    files:
      - 'gradle.properties'
      - 'gradle/wrapper/**/*'
      - '**/*.gradle'
