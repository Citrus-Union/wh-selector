# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: Build

on:
  push:
  pull_request:

jobs:
  legacy-1-21:
    name: Build 1.21.x
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set Gradle Java home
        run: sed -i "s|^org\.gradle\.java\.home=.*|org.gradle.java.home=${JAVA_HOME}|" gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build retained 1.21.x versions
        run: ./gradlew build --console=plain --no-daemon

      - name: Upload 1.21.x artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wh-selector-1.21.x
          path: versions/*/build/libs/*.jar
          if-no-files-found: error

  minecraft-26-1-2:
    name: Build 26.1.2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'

      - name: Set Gradle Java home
        run: sed -i "s|^org\.gradle\.java\.home=.*|org.gradle.java.home=${JAVA_HOME}|" gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Minecraft 26.1.2
        run: ./gradlew -Pinclude26=true :26.1.2:build --console=plain --no-daemon

      - name: Upload 26.1.2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wh-selector-26.1.2
          path: versions/26.1.2/build/libs/*.jar
          if-no-files-found: error
